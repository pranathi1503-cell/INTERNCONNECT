<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InternConnect - Login</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div id="navbarRoot"></div>
    <main class="page">
      <section class="card form-wrap">
        <h2>Login</h2>
        <form id="loginForm" class="form-grid">
          <select id="loginRole">
            <option value="student">As Student</option>
            <option value="recruiter">As Recruiter</option>
            <option value="admin">As Admin</option>
          </select>
          <input id="email" type="email" placeholder="Email" required />
          <input id="password" type="password" placeholder="Password" required />
          <input id="mobile" type="text" placeholder="Mobile (Student only)" />
          <input id="age" type="number" min="0" placeholder="Age (Student only)" />
          <button type="submit">Login</button>
        </form>
        <p id="loginMsg" class="status-note"></p>
        <p class="helper-link">Don't have an account? <a href="/register.html">Register here</a></p>
      </section>
    </main>
    <div id="chatbotRoot"></div>
    <script src="/common.js"></script>
    <script src="/login.js"></script>
  </body>
</html>
